<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SmallMail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh;}
.header{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid #ddd;gap:20px;background:white;}
.header h1{font-size:22px;color:#5f6368;}
.header h1 span{color:#ea4335;}
.search-bar{flex:1;display:flex;align-items:center;background:#eaf1fb;border-radius:25px;padding:10px 20px;gap:10px;max-width:700px;}
.search-bar input{border:none;background:transparent;outline:none;font-size:16px;width:100%;}
.account-icon{width:35px;height:35px;border-radius:50%;background:#1a73e8;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;margin-left:auto;}
.account-menu{position:absolute;right:20px;top:60px;background:white;border:1px solid #ddd;border-radius:8px;display:none;z-index:999;}
.account-menu div{padding:10px 16px;cursor:pointer;}
.account-menu div:hover{background:#eee;}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:180px;border-right:1px solid #ddd;padding:10px 0;}
.compose-btn{margin:5px 10px 15px;padding:15px;background:#c2e7ff;border:none;border-radius:20px;cursor:pointer;width:calc(100% - 20px);}
.refresh-btn{margin:0 10px 10px;padding:8px;background:#f1f3f4;border:none;border-radius:20px;cursor:pointer;width:calc(100% - 20px);}
.nav-item{padding:8px 20px;cursor:pointer;}
.nav-item.active{font-weight:bold;}
.nav-item:hover{background:#eee;}
.user-label{font-size:12px;color:#777;padding:0 10px 10px;word-break:break-all;}
.email-list{flex:1;overflow:auto;}
.email-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;gap:10px;}
.email-row.unread{font-weight:bold;}
.email-row:hover{background:#f5f5f5;}
.star{cursor:pointer;font-size:18px;color:#bbb;}
.star.starred{color:#f4b400;}
.sender{min-width:150px;}
.email-content{flex:1;}
.preview{color:#777;font-weight:normal;}
.time{font-size:12px;color:#777;}
.email-panel{width:500px;border-left:1px solid #ddd;padding:20px;overflow:auto;display:none;}
.compose-modal{position:fixed;bottom:0;right:20px;width:420px;background:white;border-radius:10px 10px 0 0;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:none;flex-direction:column;}
.compose-modal.open{display:flex;}
.compose-header{background:#404040;color:white;padding:10px;display:flex;justify-content:space-between;border-radius:10px 10px 0 0;}
.compose-fields input,.compose-fields textarea{border:none;border-bottom:1px solid #ddd;padding:10px;font-size:14px;outline:none;width:100%;}
.compose-fields textarea{height:200px;resize:none;font-family:monospace;font-size:13px;}
.compose-footer{padding:10px;}
.send-btn{background:#1a73e8;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;}
.delete-sub-btn{margin-top:8px;background:#ea4335;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <h1>Small<span>Mail</span></h1>
  <div class="search-bar">
    🔍
    <input id="searchInput" placeholder="Search mail" oninput="renderEmails()">
  </div>
  <div class="account-icon" onclick="toggleMenu()" id="accountIcon">?</div>
  <div class="account-menu" id="accountMenu">
    <div onclick="logout()">Sign Out</div>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <button class="compose-btn" onclick="openCompose()">Compose</button>
    <button class="refresh-btn" onclick="loadInbox()">↻ Refresh</button>
    <div class="user-label" id="userLabel"></div>
    <div class="nav-item active" onclick="switchView('inbox',this)">Inbox</div>
    <div class="nav-item" onclick="switchView('starred',this)">Starred</div>
    <div class="nav-item" onclick="switchView('sent',this)">Sent</div>
    <div class="nav-item" onclick="switchView('drafts',this)">Drafts</div>
    <div class="nav-item" onclick="switchView('trash',this)">Trash</div>
    <div class="nav-item" onclick="switchView('subemails',this)">SubEmails</div>
  </div>

  <div class="email-list" id="emailList"></div>
  <div class="email-panel" id="emailPanel"></div>
  <div class="email-panel" id="subEmailPanel" style="display:none;"></div>
</div>

<div class="compose-modal" id="composeModal">
  <div class="compose-header">
    <span>New Message</span>
    <button onclick="closeCompose()" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">✕</button>
  </div>
  <div class="compose-fields">
    <input id="composeTo" placeholder="To">
    <input id="composeSubject" placeholder="Subject">
    <textarea id="composeBody" placeholder="Write message"></textarea>
  </div>
  <div class="compose-footer">
    <button class="send-btn" onclick="sendEmail()">Send</button>
    <label style="cursor:pointer;padding:10px;color:#1a73e8;font-size:13px;">
      📎 Attach
      <input type="file" id="attachInput" multiple style="display:none" onchange="handleAttach(event)">
    </label>
    <span id="attachLabel" style="font-size:12px;color:#777;"></span>
  </div>
</div>

<div class="compose-modal" id="subEmailModal">
  <div class="compose-header">
    <span>Create SubEmail</span>
    <button onclick="closeSubEmailModal()" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">✕</button>
  </div>
  <div class="compose-fields">
    <input id="subAddress" placeholder="SubEmail address (example: shopping@submail.com)">
    <input id="subLabel" placeholder="Label (example: Shopping)">
    <input id="allowedSenders" placeholder="Allowed senders, comma-separated">
  </div>
  <div class="compose-footer">
    <button class="send-btn" onclick="createSubEmail()">Create</button>
  </div>
</div>

<script>
const SERVER = "http://localhost:8080";

const userEmail = sessionStorage.getItem('userEmail');
const userName  = sessionStorage.getItem('userName');
if (!userEmail) window.location.href = 'login.html';

document.getElementById('accountIcon').textContent = userName ? userName[0].toUpperCase() : '?';
document.getElementById('userLabel').textContent = userEmail;

let view = "inbox";
let inbox = [];
let sent = [];
let drafts = [];
let trash = [];
let subEmails = [];
let currentEmail = null;

function cleanBody(text) {
  return (text || '').replace(/\\n/g, '\n').replace(/\r/g, '');
}

function getCleanBody(mail) {
  const body = cleanBody(mail.body || '');
  const cutoffs = ['--- On ', '--- Original ---'];
  let result = body;
  for (const cut of cutoffs) {
    const idx = body.indexOf(cut);
    if (idx !== -1) {
      const before = body.substring(0, idx).trim();
      if (before.length < result.length) result = before;
    }
  }
  return result;
}

let pendingAttachments = [];

function handleAttach(e) {
  const files = Array.from(e.target.files);
  pendingAttachments = files;
  document.getElementById("attachLabel").textContent =
    files.length === 1 ? files[0].name : files.length + " files attached";
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderAttachments(attachments) {
  if (!attachments || attachments.length === 0) return '';
  let html = '<div style="margin-top:15px;border-top:1px solid #eee;padding-top:10px;"><b>Attachments</b>';
  attachments.forEach((a, i) => {
    html += `<div style="margin:8px 0;font-size:13px;">
      📎 ${a.name} (${formatSize(a.size)})
      <button onclick="previewAttachment(${i})" style="margin-left:8px;font-size:12px;cursor:pointer;">Preview</button>
      <button onclick="downloadAttachment(${i})" style="margin-left:4px;font-size:12px;cursor:pointer;">Download</button>
    </div>`;
  });
  html += '</div>';
  return html;
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function previewAttachment(idx) {
  const a = currentEmail._attachments[idx];
  if (!a) return;
  const type = a.type || '';
  const win = window.open('', '_blank');
  if (type.startsWith('image/')) {
    win.document.write(`<img src="${a.data}" style="max-width:100%">`);
  } else if (type === 'application/pdf') {
    win.document.write(`<iframe src="${a.data}" width="100%" height="100%" style="border:none;position:fixed;top:0;left:0;"></iframe>`);
  } else if (type.startsWith('text/')) {
    fetch(a.data).then(r => r.text()).then(txt => {
      win.document.write(`<pre style="font-family:monospace;padding:20px">${txt}</pre>`);
    });
  } else {
    win.document.write(`<p style="font-family:Arial;padding:20px">Preview not available for this file type.<br><br>
      <a href="${a.data}" download="${a.name}">Click here to download</a></p>`);
  }
}

function downloadAttachment(idx) {
  const a = currentEmail._attachments[idx];
  if (!a) return;
  const link = document.createElement('a');
  link.href = a.data;
  link.download = a.name;
  link.click();
}

const readIds = new Set();

async function loadInbox() {
  const res = await fetch(SERVER + "/inbox?email=" + encodeURIComponent(userEmail));
  const fresh = await res.json();
  fresh.forEach(m => { if (readIds.has(m.id)) m.read = true; });
  inbox = fresh;
  if (view === 'inbox') renderEmails();
}

async function loadSent() {
  const res = await fetch(SERVER + "/sent?email=" + encodeURIComponent(userEmail));
  const fresh = await res.json();
  fresh.forEach(m => { if (readIds.has(m.id)) m.read = true; });
  sent = fresh;
  if (view === 'sent') renderEmails();
}

async function loadSubEmails() {
  const res = await fetch(SERVER + "/getSubEmails?email=" + encodeURIComponent(userEmail));
  subEmails = await res.json();
  if (view === "subemails") {
    renderSubEmails();
  }
}

function getSource() {
  if (view === 'inbox') return inbox;
  if (view === 'sent') return sent;
  if (view === 'drafts') return drafts;
  if (view === 'trash') return trash;
  if (view === 'starred') return inbox.filter(m => m.star);
  return inbox;
}

function renderEmails() {
  const list = document.getElementById("emailList");
  list.innerHTML = "";
  document.getElementById("subEmailPanel").style.display = "none";

  const source = getSource();
  const search = document.getElementById("searchInput").value.toLowerCase();

  source.forEach((mail, i) => {
    if (search && !mail.subject.toLowerCase().includes(search) &&
        !mail.sender.toLowerCase().includes(search)) return;

    const previewText = getCleanBody(mail).replace(/\n/g, ' ');
    const preview = (previewText || mail.body || '').substring(0, 80);

    const row = document.createElement("div");
    row.className = "email-row " + (mail.read ? "" : "unread");
    row.innerHTML = `
      <span class="star ${mail.star ? 'starred' : ''}" onclick="toggleStar(event,${i})">★</span>
      <span class="sender">${mail.sender}</span>
      <div class="email-content">
        ${mail.subject} <span class="preview">— ${preview}</span>
      </div>
      <span class="time">${mail.time}${view==='drafts'?' <i style="color:#999">Draft</i>':''}</span>
    `;
    row.onclick = () => openEmail(i);
    list.appendChild(row);
  });
}

function renderSubEmails() {
  document.getElementById("emailList").innerHTML = "";
  document.getElementById("emailPanel").style.display = "none";

  const panel = document.getElementById("subEmailPanel");
  panel.style.display = "block";

  let html = `
    <h2>SubEmails</h2>
    <br>
    <button class="send-btn" onclick="openSubEmailModal()">+ Create SubEmail</button>
    <br><br>
  `;

  if (!subEmails || subEmails.length === 0) {
    html += `<p>No SubEmails created yet.</p>`;
  } else {
    for (let i = 0; i < subEmails.length; i++) {
      const sub = subEmails[i];
      const senders = sub.allowedSenders && sub.allowedSenders.length > 0
        ? sub.allowedSenders.join(", ")
        : "Anyone";

      html += `
        <div style="border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:12px;">
          <p><b>Address:</b> ${sub.subAddress}</p>
          <p><b>Label:</b> ${sub.label}</p>
          <p><b>Status:</b> ${sub.isActive ? "Active" : "Inactive"}</p>
          <p><b>Allowed Senders:</b> ${senders}</p>
          <button class="delete-sub-btn" onclick="deleteSubEmail('${sub.subAddress}')">Delete</button>
        </div>
      `;
    }
  }

  panel.innerHTML = html;
}

function openEmail(index) {
  const mail = getSource()[index];
  currentEmail = mail;
  mail.read = true;
  if (mail.id) readIds.add(mail.id);
  renderEmails();

  if (view === 'drafts') {
    document.getElementById("composeTo").value = mail.recipient || '';
    document.getElementById("composeSubject").value = mail.subject || '';
    document.getElementById("composeBody").value = cleanBody(mail.body || '');
    document.getElementById("composeModal").classList.add("open");
    window.editingDraftIndex = index;
    return;
  }

  const formattedBody = cleanBody(mail.body || '').replace(/\n/g, '<br>');
  const attachHTML = renderAttachments(mail.attachments || mail._attachments);
  if (mail.attachments) mail._attachments = mail.attachments;

  document.getElementById("emailPanel").style.display = 'block';
  document.getElementById("subEmailPanel").style.display = 'none';
  document.getElementById("emailPanel").innerHTML = `
    <h2>${mail.subject}</h2>
    <p><b>From:</b> ${mail.sender}</p>
    <p><b>To:</b> ${mail.recipient || ''}</p>
    <p><b>Time:</b> ${mail.time}</p>
    <br>
    <p>${formattedBody}</p>
    ${attachHTML}
    <br>
    <button onclick="reply()">Reply</button>
    <button onclick="replyAll()">Reply All</button>
    <button onclick="forward()">Forward</button>
    <button onclick="deleteEmail()">Delete</button>
    ${view === 'trash' ? '<button onclick="restoreEmail()">Restore</button>' : ''}
  `;
}

async function deleteEmail() {
  if (!currentEmail) return;
  const src = getSource();
  const idx = src.indexOf(currentEmail);
  if (idx === -1) return;

  if (currentEmail.id && view !== 'drafts') {
    const deleteFrom = view === 'trash' ? 'trash' : view;
    await fetch(SERVER + "/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: userEmail, id: currentEmail.id, folder: deleteFrom === 'trash' ? 'inbox' : deleteFrom })
    });
  }

  if (view === 'trash' || view === 'drafts') {
    src.splice(idx, 1);
  } else {
    trash.push(currentEmail);
    src.splice(idx, 1);
  }

  currentEmail = null;
  renderEmails();
  document.getElementById("emailPanel").style.display = 'none';
}

function restoreEmail() {
  if (!currentEmail) return;
  inbox.unshift(currentEmail);
  trash.splice(trash.indexOf(currentEmail), 1);
  currentEmail = null;
  switchView('inbox', document.querySelector('.nav-item'));
  document.getElementById("emailPanel").style.display = 'none';
}

function toggleStar(e, index) {
  e.stopPropagation();
  const src = getSource();
  src[index].star = !src[index].star;
  renderEmails();
}

function reply() {
  openCompose();
  document.getElementById("composeTo").value = currentEmail.sender;
  const subj = currentEmail.subject.replace(/^(Re:\s*)+/i, '');
  document.getElementById("composeSubject").value = "Re: " + subj;
  const clean = getCleanBody(currentEmail);
  const quote = "\n--- On " + currentEmail.time + ", " + currentEmail.sender + " wrote ---\n" + clean;
  document.getElementById("composeBody").value = quote;
  const ta = document.getElementById("composeBody");
  ta.focus();
  ta.setSelectionRange(0, 0);
  ta.scrollTop = 0;
}

function replyAll() {
  reply();
}

function forward() {
  openCompose();
  const subj = currentEmail.subject.replace(/^(Fwd:\s*)+/i, '');
  document.getElementById("composeSubject").value = "Fwd: " + subj;
  document.getElementById("composeBody").value = getCleanBody(currentEmail);
}

function openCompose() {
  window.editingDraftIndex = undefined;
  document.getElementById("composeModal").classList.add("open");
}

function closeCompose() {
  const to = document.getElementById("composeTo").value;
  const subject = document.getElementById("composeSubject").value;
  const body = document.getElementById("composeBody").value;

  if (to || subject || body) {
    const draftObj = { sender: userEmail, recipient: to, subject, body, time: "Draft", star: false, read: true };
    if (window.editingDraftIndex !== undefined) {
      drafts[window.editingDraftIndex] = draftObj;
      window.editingDraftIndex = undefined;
    } else {
      drafts.push(draftObj);
    }
    if (view === 'drafts') renderEmails();
  }

  document.getElementById("composeModal").classList.remove("open");
  clearCompose();
}

function clearCompose() {
  document.getElementById("composeTo").value = "";
  document.getElementById("composeSubject").value = "";
  document.getElementById("composeBody").value = "";
}

function openSubEmailModal() {
  document.getElementById("subEmailModal").classList.add("open");
}

function closeSubEmailModal() {
  document.getElementById("subEmailModal").classList.remove("open");
  document.getElementById("subAddress").value = "";
  document.getElementById("subLabel").value = "";
  document.getElementById("allowedSenders").value = "";
}

async function createSubEmail() {
  const subAddress = document.getElementById("subAddress").value.trim();
  const label = document.getElementById("subLabel").value.trim();
  const allowedSendersText = document.getElementById("allowedSenders").value.trim();

  if (!subAddress || !label) {
    alert("SubEmail address and label are required");
    return;
  }

  const allowedSenders = allowedSendersText
    ? allowedSendersText.split(",").map(s => s.trim()).filter(s => s)
    : [];

  const res = await fetch(SERVER + "/createSubEmail", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ownerEmail: userEmail,
      subAddress: subAddress,
      label: label,
      allowedSenders: allowedSenders
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("SubEmail created!");
    closeSubEmailModal();
    loadSubEmails();
  } else {
    alert("Failed to create SubEmail: " + (data.error || "unknown error"));
  }
}

async function deleteSubEmail(subAddress) {
  const ok = confirm("Delete this SubEmail?");
  if (!ok) return;

  const res = await fetch(SERVER + "/deleteSubEmail", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ownerEmail: userEmail,
      subAddress: subAddress
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("SubEmail deleted");
    loadSubEmails();
  } else {
    alert("Failed to delete SubEmail");
  }
}

async function sendEmail() {
  const to = document.getElementById("composeTo").value.trim();
  const subject = document.getElementById("composeSubject").value.trim();
  const body = document.getElementById("composeBody").value.trim();

  if (!to) {
    alert("Recipient required");
    return;
  }

  const attachments = [];
  for (const file of pendingAttachments) {
    const data = await fileToBase64(file);
    attachments.push({ name: file.name, size: file.size, type: file.type, data });
  }

  const res = await fetch(SERVER + "/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sender: userEmail, recipient: to, subject, body, attachments })
  });

  const data = await res.json();

  if (data.success) {
    if (window.editingDraftIndex !== undefined) {
      drafts.splice(window.editingDraftIndex, 1);
      window.editingDraftIndex = undefined;
    }
    alert("Email sent!");
    document.getElementById("composeModal").classList.remove("open");
    clearCompose();
    pendingAttachments = [];
    document.getElementById("attachLabel").textContent = '';
    loadSent();
  } else {
    alert("Failed to send: " + (data.error || "unknown error"));
  }
}

function switchView(v, el) {
  view = v;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("emailPanel").style.display = 'none';
  document.getElementById("subEmailPanel").style.display = 'none';

  if (v === 'sent') {
    loadSent();
    return;
  }

  if (v === 'subemails') {
    loadSubEmails();
    return;
  }

  renderEmails();
}

function toggleMenu() {
  const m = document.getElementById("accountMenu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

function logout() {
  sessionStorage.clear();
  window.location.href = 'login.html';
}

loadInbox();
</script>
</body>
</html>
