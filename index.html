<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Email Client</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:10px 20px;
border-bottom:1px solid #ddd;
gap:20px;
background:white;
}

.header h1{font-size:22px;color:#5f6368;}
.header h1 span{color:#ea4335;}

.search-bar{
flex:1;
display:flex;
align-items:center;
background:#eaf1fb;
border-radius:25px;
padding:10px 20px;
gap:10px;
max-width:700px;
}

.search-bar input{
border:none;
background:transparent;
outline:none;
font-size:16px;
width:100%;
}

.account-icon{
width:35px;height:35px;border-radius:50%;
background:#1a73e8;color:white;
display:flex;align-items:center;justify-content:center;
font-weight:bold;cursor:pointer;margin-left:auto;
}

.account-menu{
position:absolute;
right:20px;top:60px;
background:white;
border:1px solid #ddd;
border-radius:8px;
display:none;
}

.account-menu div{
padding:10px 16px;
cursor:pointer;
}

.account-menu div:hover{background:#eee;}

/* BODY */

.body{display:flex;flex:1;overflow:hidden;}

.sidebar{
width:180px;
border-right:1px solid #ddd;
padding:10px 0;
}

.compose-btn{
margin:5px 10px 15px;
padding:15px;
background:#c2e7ff;
border:none;
border-radius:20px;
cursor:pointer;
width:calc(100% - 20px);
}

.nav-item{
padding:8px 20px;
cursor:pointer;
}

.nav-item.active{font-weight:bold;}
.nav-item:hover{background:#eee;}

.email-list{flex:1;overflow:auto;}

.email-row{
display:flex;
align-items:center;
padding:8px 12px;
border-bottom:1px solid #eee;
cursor:pointer;
gap:10px;
}

.email-row.unread{font-weight:bold;}
.email-row:hover{background:#f5f5f5;}

.star{cursor:pointer;font-size:18px;color:#bbb;}
.star.starred{color:#f4b400;}

.sender{min-width:150px;}
.email-content{flex:1;}
.preview{color:#777;font-weight:normal;}

.time{font-size:12px;color:#777;}

.email-panel{
width:500px;
border-left:1px solid #ddd;
padding:20px;
overflow:auto;
}

.panel-placeholder{text-align:center;color:#aaa;margin-top:100px;}

.attachments{margin-top:15px;border-top:1px solid #eee;padding-top:10px;}
.attachment-item{font-size:13px;margin-bottom:6px;}

.compose-modal{
position:fixed;
bottom:0;
right:20px;
width:420px;
background:white;
border-radius:10px 10px 0 0;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
}

.compose-modal.open{display:flex;}

.compose-header{
background:#404040;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.compose-fields input,
.compose-fields textarea{
border:none;
border-bottom:1px solid #ddd;
padding:10px;
font-size:14px;
outline:none;
}

.compose-fields textarea{height:200px;resize:none;}

.compose-footer{padding:10px;}

.send-btn{
background:#1a73e8;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<h1>M<span>.</span></h1>

<div class="search-bar">
🔍
<input id="searchInput" placeholder="Search mail" oninput="renderEmails()">
</div>

<div class="account-icon" onclick="toggleMenu()">P</div>

<div class="account-menu" id="accountMenu">
<div onclick="logout()">Sign Out</div>
</div>

</div>

<div class="body">

<div class="sidebar">

<button class="compose-btn" onclick="openCompose()">Compose</button>

<div class="nav-item active" onclick="switchView('inbox',this)">Inbox</div>
<div class="nav-item" onclick="switchView('starred',this)">Starred</div>
<div class="nav-item" onclick="switchView('sent',this)">Sent</div>
<div class="nav-item" onclick="switchView('drafts',this)">Drafts</div>
<div class="nav-item" onclick="switchView('trash',this)">Trash</div>

</div>

<div class="email-list" id="emailList"></div>

<div class="email-panel" id="emailPanel">
<div class="panel-placeholder">Select an email</div>
</div>

</div>

<div class="compose-modal" id="composeModal">

<div class="compose-header">
<span id="composeTitle">New Message</span>
<button onclick="closeCompose()">X</button>
</div>

<div class="compose-fields">
<input id="composeTo" placeholder="To">
<input id="composeSubject" placeholder="Subject">
<textarea id="composeBody" placeholder="Write message"></textarea>
</div>

<div class="compose-footer">
<button class="send-btn" onclick="sendEmail()">Send</button>
</div>

</div>

<script>

let view="inbox";

const inbox=[
{sender:"Alice",subject:"Meeting",body:"Let's meet tomorrow.",time:"10:42",star:false,read:false,attachments:[]},
{sender:"Bob",subject:"Homework",body:"Don't forget the assignment.",time:"9:15",star:true,read:false,attachments:[{name:"notes.txt"}]}
];

const sent=[];
const drafts=[];
const trash=[];

let currentEmail=null;

function renderEmails(){

const list=document.getElementById("emailList");
list.innerHTML="";

let source=getSource();
const search=document.getElementById("searchInput").value.toLowerCase();

source.forEach((mail,i)=>{

if(search && !mail.subject.toLowerCase().includes(search) && !mail.sender.toLowerCase().includes(search)) return;

const row=document.createElement("div");
row.className="email-row "+(mail.read?"":"unread");

row.innerHTML=`
<span class="star ${mail.star?"starred":""}" onclick="toggleStar(event,${i})">★</span>
<span class="sender">${mail.sender}</span>
<div class="email-content">
${mail.subject} <span class="preview">— ${mail.body}</span>
</div>
<span class="time">${mail.time}</span>
`;

row.onclick=()=>openEmail(i);

list.appendChild(row);

});

}

function getSource(){

if(view==="inbox") return inbox;
if(view==="sent") return sent;
if(view==="drafts") return drafts;
if(view==="trash") return trash;
if(view==="starred") return inbox.filter(m=>m.star);

return inbox;

}

function openEmail(index){

const mail=getSource()[index];
currentEmail=mail;

mail.read=true;
renderEmails();

let attachHTML="";

if(mail.attachments.length>0){

attachHTML="<div class='attachments'><b>Attachments</b>";

mail.attachments.forEach(a=>{
attachHTML+=`<div class='attachment-item'>📎 ${a.name}</div>`;
});

attachHTML+="</div>";

}

document.getElementById("emailPanel").innerHTML=`

<h2>${mail.subject}</h2>
<p><b>From:</b> ${mail.sender}</p>
<p>${mail.body}</p>

<br>

<button onclick="reply()">Reply</button>
<button onclick="replyAll()">Reply All</button>
<button onclick="forward()">Forward</button>
<button onclick="deleteEmail()">Delete</button>
${view==="trash" ? '<button onclick="restoreEmail()">Restore</button>' : ""}

${attachHTML}

`;

}

function deleteEmail(){

trash.push(currentEmail);

let src=getSource();
src.splice(src.indexOf(currentEmail),1);

renderEmails();

document.getElementById("emailPanel").innerHTML="<div class='panel-placeholder'>Email deleted</div>";

}

function restoreEmail(){

inbox.push(currentEmail);

trash.splice(trash.indexOf(currentEmail),1);

renderEmails();

document.getElementById("emailPanel").innerHTML="<div class='panel-placeholder'>Email restored</div>";

}

function toggleStar(e,index){

e.stopPropagation();

const src=getSource();
src[index].star=!src[index].star;

renderEmails();

}

function reply(){

openCompose();
document.getElementById("composeTo").value=currentEmail.sender;
document.getElementById("composeSubject").value="Re: "+currentEmail.subject;

}

function replyAll(){
reply();
}

function forward(){

openCompose();
document.getElementById("composeSubject").value="Fwd: "+currentEmail.subject;
document.getElementById("composeBody").value=currentEmail.body;

}

function openCompose(){
document.getElementById("composeModal").classList.add("open");
}

function closeCompose(){

const to=document.getElementById("composeTo").value;
const subject=document.getElementById("composeSubject").value;
const body=document.getElementById("composeBody").value;

if(to||subject||body){
if(confirm("Save draft?")){
drafts.push({sender:"Me",subject,body,time:"Draft",star:false,read:true,attachments:[]});
}
}

document.getElementById("composeModal").classList.remove("open");

}

function sendEmail(){

const to=document.getElementById("composeTo").value;
const subject=document.getElementById("composeSubject").value;
const body=document.getElementById("composeBody").value;

if(!to){
alert("Recipient required");
return;
}

sent.push({sender:"Me",subject,body,time:"Now",star:false,read:true,attachments:[]});

document.getElementById("composeModal").classList.remove("open");

document.getElementById("composeTo").value="";
document.getElementById("composeSubject").value="";
document.getElementById("composeBody").value="";

alert("Email sent!");

}

function switchView(v,el){

view=v;

document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
el.classList.add("active");

renderEmails();

}

function toggleMenu(){

const m=document.getElementById("accountMenu");
m.style.display=m.style.display==="block"?"none":"block";

}

function logout(){
alert("Logged out");
}

renderEmails();

</script>

</body>
</html>
